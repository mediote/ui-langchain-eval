services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - AUTH_ENABLED=false
      - LANGFUSE_BASE_URL=http://host.docker.internal:3000
    volumes:
      - ./src:/app/src   # hot reload em dev
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
